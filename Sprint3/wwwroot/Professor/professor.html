<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor - Hilberto Silva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-green: #54a790;
            --dark-bg: #2E4D68;
        }

        .navbar-custom {
            background-color: var(--primary-green);
        }

        .card-custom {
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .table-custom th {
            background-color: #f8f9fa;
            color: var(--dark-bg);
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-chalkboard-teacher me-2"></i>Portal do Professor</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3 fw-medium" id="nomeProfessor">Professor(a)</span>
                <button class="btn btn-sm btn-outline-light" id="btnSair">
                    <i class="fas fa-sign-out-alt me-1"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 mt-4">

        <div class="card card-custom border-0 mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted">Turma</label>
                        <select class="form-select" id="selectTurma">
                            <option value="">Selecione a turma...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted">Disciplina</label>
                        <select class="form-select" id="selectDisciplina" disabled>
                            <option value="">Selecione a disciplina...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-success w-100" id="btnBuscarAlunos" style="background-color: var(--primary-green); border: none;">
                            <i class="fas fa-search me-2"></i> Buscar Alunos
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card card-custom border-0">
            <div class="card-header bg-white border-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                <h5 class="mb-0" style="color: var(--dark-bg);"><i class="fas fa-users me-2"></i>Diário de Classe</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-custom border align-middle" id="tabelaAlunos">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Nome do Aluno</th>
                                <th class="text-center">Unidade 1</th>
                                <th class="text-center">Unidade 2</th>
                                <th class="text-center">Unidade 3</th>
                                <th class="text-center">Frequência (%)</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabelaAlunos">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-4">
                                    Selecione uma turma e disciplina para carregar os alunos.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalLancarNotas" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" style="color: var(--dark-bg);">
                        <i class="fas fa-edit me-2"></i>Lançar Notas e Frequência
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-4">Aluno: <strong id="modalNomeAluno" class="text-dark">Nome do Aluno</strong></p>

                    <form id="formLancarNotas">
                        <input type="hidden" id="modalIdAluno">

                        <div class="row mb-3">
                            <div class="col-4">
                                <label class="form-label small fw-bold">Unidade 1</label>
                                <input type="number" class="form-control text-center" id="notaU1" min="0" max="10" step="0.1">
                            </div>
                            <div class="col-4">
                                <label class="form-label small fw-bold">Unidade 2</label>
                                <input type="number" class="form-control text-center" id="notaU2" min="0" max="10" step="0.1">
                            </div>
                            <div class="col-4">
                                <label class="form-label small fw-bold">Unidade 3</label>
                                <input type="number" class="form-control text-center" id="notaU3" min="0" max="10" step="0.1">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold">Frequência Total (%)</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="frequencia" min="0" max="100">
                                <span class="input-group-text">%</span>
                            </div>
                        </div>

                        <div id="alertModal" class="d-none"></div>

                        <div class="d-flex justify-content-end border-top pt-3">
                            <button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success" id="btnSalvarNotas" style="background-color: var(--primary-green); border: none;">Salvar Lançamento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="professor.js"></script>
</body>
</html>
