<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hilberto Silva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="d-lg-none d-flex justify-content-between align-items-center p-3 text-white shadow-sm" style="background-color: var(--primary-green);">
        <h5 class="m-0 fw-bold">Portal Admin</h5>
        <button class="btn btn-outline-light border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
            <i class="fas fa-bars fa-lg"></i>
        </button>
    </div>

    <div class="container-fluid">
        <div class="row">

            <div class="col-lg-2 sidebar offcanvas-lg offcanvas-start" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">

                <div class="offcanvas-header d-lg-none border-bottom border-light border-opacity-25 pb-3 mb-3">
                    <h5 class="offcanvas-title text-white fw-bold" id="sidebarMenuLabel">Menu</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Close"></button>
                </div>

                <div class="offcanvas-body d-flex flex-column p-0">
                    <h4 class="d-none d-lg-block">Portal Admin</h4>
                    <ul class="nav flex-column w-100" id="menuSidebar">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" data-entity="alunos" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu">
                                <i class="fas fa-user-graduate"></i> Alunos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-entity="professor" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu">
                                <i class="fas fa-chalkboard-teacher"></i> Professores
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-entity="disciplina" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu">
                                <i class="fas fa-book"></i> Disciplinas
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-entity="turma" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu">
                                <i class="fas fa-school"></i> Turmas
                            </a>
                        </li>
                        <li class="nav-item mt-4 mb-4">
                            <a class="nav-link btn-logout" href="#" id="btnLogout">
                                <i class="fas fa-sign-out-alt"></i> Sair
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="col-lg-10 main-content">
                <div class="header-action">
                    <h2 id="pageTitle" style="color: var(--dark-bg); font-weight: bold; display: flex; align-items: center; flex-wrap: wrap;">Gerenciar Alunos</h2>
                    <button class="btn btn-green px-4" id="btnAddNew">
                        <i class="fas fa-plus"></i> Adicionar Novo
                    </button>
                </div>

                <div id="alertFeedback" class="alert d-none" role="alert"></div>

                <div class="card card-custom p-3 p-lg-4">
                    <div class="table-responsive">
                        <table class="table table-hover table-custom mb-0 text-nowrap">
                            <thead id="tableHead">
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="100" class="text-center">Carregando dados...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header" style="background-color: var(--primary-green); color: white;">
                    <h5 class="modal-title" id="modalTitle">Cadastrar</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="dynamicForm">
                        <input type="hidden" id="entityId">
                        <div id="formFieldsContainer">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-green" id="btnSaveEntity">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Atenção!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0 fs-5">Você tem certeza que deseja excluir este registro?</p>
                    <p class="text-danger mt-2 mb-0"><small><strong>Aviso:</strong> Esta ação é irreversível e os dados serão apagados permanentemente do sistema.</small></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmDelete">
                        <i class="fas fa-trash me-1"></i> Excluir Permanentemente
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
