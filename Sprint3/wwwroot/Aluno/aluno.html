<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno - Hilberto Silva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="aluno.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm" style="background-color: var(--primary-green, #54a790);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fas fa-graduation-cap me-2"></i>Escola Hilberto Silva</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3 fw-medium" id="nomeUsuario">Bem-vindo(a)!</span>
                <button class="btn btn-sm btn-outline-light me-3" data-bs-toggle="modal" data-bs-target="#modalAlterarSenha">
                    <i class="fas fa-key me-1"></i> Mudar Senha
                </button>
                <button class="btn btn-sm btn-danger" id="btnSair">
                    <i class="fas fa-sign-out-alt me-1"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card card-custom p-2 shadow-sm border-0">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h4 class="mb-0" style="color: #2E4D68;"><i class="fas fa-clipboard-list me-2"></i>Meu Boletim Escolar</h4>
                    </div>
                    <div class="card-body" id="conteudoBoletim">
                        <div class="text-center py-5">
                            <div class="spinner-border text-success" role="status"></div>
                            <p class="text-muted mt-3">Buscando suas notas...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAlterarSenha" tabindex="-1" aria-labelledby="modalAlterarSenhaLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalAlterarSenhaLabel" style="color: #2E4D68;">
                        <i class="fas fa-lock me-2"></i>Alterar Minha Senha
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="formAlterarSenha">

                        <div id="alertSenha" class="d-none"></div>

                        <div class="mb-3 mt-2">
                            <label class="form-label text-muted fw-bold">Senha Atual</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="senhaAtual">
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="senhaAtual">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="text-danger small mt-1 d-none" id="erroSenhaAtual"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold">Nova Senha</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="novaSenha" placeholder="Ex: Escola@2026">
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="novaSenha">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="form-text" style="font-size: 0.8rem;" id="dicaSenha">
                                Mín. 8 caracteres, contendo letras, números e um caractere especial (!@#$%).
                            </div>
                            <div class="text-danger small mt-1 d-none" id="erroNovaSenha"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold">Confirmar Nova Senha</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="confirmarSenha">
                                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="confirmarSenha">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="text-danger small mt-1 d-none" id="erroConfirmarSenha"></div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success" id="btnSalvarNovaSenha" style="background-color: var(--primary-green, #54a790); border: none;">Salvar Nova Senha</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="aluno.js"></script>
</body>
</html>
